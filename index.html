<style>

body{font-family:system-ui,-apple-system,sans-serif;background:#0f0d1a;color:#e8e4ff;height:100vh;overflow:hidden;font-size:13px}

<script>
// ─── Supabase Config ───────────────────────────────────────────────────────
const SB_URL = 'https://gwguidsjzwuamhunjivz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3Z3VpZHNqend1YW1odW5qaXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MTQzNTcsImV4cCI6MjA5ODA5MDM1N30.eGE4RegxhvvJEaSwCHm1GCVs32IokmHKB286gMkKgsA';
const HEADERS = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'};

// ─── GitHub Config ─────────────────────────────────────────────────────────
function getGHToken(){ return localStorage.getItem('gh_token') || ''; }
const GH_OWNER = 'Subhendu2009';
const GH_REPO  = 'Tasks-Probs-Solutions';
const GH_API   = 'https://api.github.com';

async function sb(method, table, body=null, query=''){
  const res = await fetch(`${SB_URL}/rest/v1/${table}${query}`,{method,headers:HEADERS,body:body?JSON.stringify(body):null});
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}
const dbGet = (table,q='') => sb('GET',table,null,q);
const dbPost = (table,body) => sb('POST',table,body);
const dbPatch = (table,body,q) => sb('PATCH',table,body,q);
const dbDelete = (table,q) => sb('DELETE',table,null,q);

// ─── GitHub file upload ────────────────────────────────────────────────────
async function uploadToGitHub(filePath, fileContent, existingSha=null){
  const url = `${GH_API}/repos/${GH_OWNER}/${GH_REPO}/contents/${filePath}`;
  const body = {
    message: `Add solution: ${filePath}`,
    content: fileContent, // base64
  };
  if(existingSha) body.sha = existingSha;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `Bearer ${getGHToken()}`,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github+json'
    },
    body: JSON.stringify(body)
  });
  if(!res.ok){
    const e = await res.json();
    throw new Error(e.message || 'GitHub upload failed');
  }
  const data = await res.json();
  return data.content.html_url;
}

async function getExistingFileSha(filePath){
  const url = `${GH_API}/repos/${GH_OWNER}/${GH_REPO}/contents/${filePath}`;
  const res = await fetch(url, {
    headers: {
      'Authorization': `Bearer ${getGHToken()}`,
      'Accept': 'application/vnd.github+json'
    }
  });
  if(res.status === 404) return null;
  const data = await res.json();
  return data.sha || null;
}

// ─── Sanitize (XSS protection) ────────────────────────────────────────────
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ─── Config ────────────────────────────────────────────────────────────────
const LXP=[0,200,500,900,1400,2000,2700,3500,4400,5400,6500,7700];
const TITLES=["Newcomer","Beginner","Learner","Apprentice","Junior Dev","Developer","Sr. Developer","Builder","Engineer","Tech Lead","Master Dev","Legend"];
const XPV={e:15,m:30,h:60};
const MILESTONES=[{days:7,xp:100},{days:14,xp:200},{days:30,xp:500}];
const COLORS=["#7F77DD","#1D9E75","#D85A30","#BA7517","#185FA5","#993556","#534AB7","#0F6E56","#639922","#D4537E"];
const WL=["M","T","W","T","F","S","S"];

// ─── State ─────────────────────────────────────────────────────────────────
let goals=[], stats={streak:0,last_active:null,attendance:[],claimed:[],bonus_xp:0};
let view={goalId:null,subId:null};
let modalState={};
let attachTarget=null;
let searchQuery='';
let _id=0;
function uid(){return 'id'+(Date.now())+(++_id);}
function toDay(){return new Date().toISOString().slice(0,10);}
function toYest(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function weekDates(){
  const now=new Date(),dow=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-(dow===0?6:dow-1));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().slice(0,10);});
}

// ─── XP / Level ────────────────────────────────────────────────────────────
function totalXP(){
  let t=stats.bonus_xp||0;
  goals.forEach(g=>g.sub.forEach(s=>s.tasks.forEach(k=>{if(k.done)t+=XPV[k.diff]||0;})));
  return t;
}
function todayXP(){
  const td=toDay();let t=0;
  goals.forEach(g=>g.sub.forEach(s=>s.tasks.forEach(k=>{if(k.done&&k.done_date===td)t+=XPV[k.diff]||0;})));
  return t;
}
function lvInfo(xp){
  let lv=1;
  for(let i=1;i<LXP.length;i++){if(xp>=LXP[i])lv=i+1;else break;}
  lv=Math.min(lv,LXP.length);
  const cur=LXP[lv-1]||0,nxt=LXP[lv]||cur+1500;
  return{lv,title:TITLES[Math.min(lv-1,TITLES.length-1)],pct:nxt>cur?Math.min(100,Math.round((xp-cur)/(nxt-cur)*100)):100,toNext:Math.max(0,nxt-xp),nxt};
}

// ─── Sync status ───────────────────────────────────────────────────────────
function setSyncStatus(state,text){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  dot.className=state; txt.textContent=text;
}

// ─── Load from Supabase ────────────────────────────────────────────────────
async function loadFromDB(){
  setSyncStatus('syncing','Loading...');
  try{
    const [rawGoals,rawSubs,rawTasks,rawStats] = await Promise.all([
      dbGet('goals','?order=position'),
      dbGet('subgoals','?order=position'),
      dbGet('tasks','?order=position'),
      dbGet('stats','?id=eq.1'),
    ]);
    goals = rawGoals.map(g=>({
      ...g,
      sub: rawSubs.filter(s=>s.goal_id===g.id).map(s=>({
        ...s,
        tasks: rawTasks.filter(t=>t.subgoal_id===s.id)
      }))
    }));
    if(rawStats&&rawStats.length>0){
      stats=rawStats[0];
      if(stats.last_active&&stats.last_active<toYest())stats.streak=0;
    }
    if(goals.length===0) await seedInitialData();
    setSyncStatus('ok','Synced');
    return true;
  }catch(e){
    setSyncStatus('err','Offline');
    showToast('Could not connect to database','err');
    return false;
  }
}

// ─── Toggle task ───────────────────────────────────────────────────────────
async function toggleTask(gid,sid,tid){
  const td=toDay();
  let diff='e',nowDone=false;
  goals=goals.map(g=>g.id!==gid?g:{...g,sub:g.sub.map(s=>s.id!==sid?s:{...s,tasks:s.tasks.map(k=>{
    if(k.id!==tid)return k;
    diff=k.diff;nowDone=!k.done;
    return{...k,done:nowDone,done_date:nowDone?td:null};
  })})});
  renderSidebar();renderContent();
  try{
    setSyncStatus('syncing','Saving...');
    await dbPatch('tasks',{done:nowDone,done_date:nowDone?td:null},`?id=eq.${tid}`);
    if(nowDone){
      const xpGained=XPV[diff]||0;
      showToast('+'+xpGained+' XP earned!','xp',()=>undoToggle(gid,sid,tid,diff,true));
      let ns={...stats};
      if(!(ns.attendance||[]).includes(td)){
        ns.attendance=[...(ns.attendance||[]),td];
        if(ns.last_active===toYest())ns.streak=(ns.streak||0)+1;
        else if(ns.last_active!==td)ns.streak=1;
        ns.last_active=td;
        await dbPatch('stats',{streak:ns.streak,last_active:ns.last_active,attendance:ns.attendance},'?id=eq.1');
        MILESTONES.forEach(async(m,i)=>{
          if(ns.streak>=m.days&&!(ns.claimed||[]).includes(i)){
            ns.bonus_xp=(ns.bonus_xp||0)+m.xp;
            ns.claimed=[...(ns.claimed||[]),i];
            await dbPatch('stats',{bonus_xp:ns.bonus_xp,claimed:ns.claimed},'?id=eq.1');
            setTimeout(()=>showToast('🔥 '+m.days+'-day streak! +'+m.xp+' XP!','milestone'),600);
          }
        });
        stats=ns;
      }
    }else{
      showToast('Task uncompleted','info',()=>undoToggle(gid,sid,tid,diff,false));
    }
    setSyncStatus('ok','Synced');
    renderSidebar();
  }catch(e){setSyncStatus('err','Sync failed');}
}
async function undoToggle(gid,sid,tid,diff,wasMarkedDone){
  const td=toDay();
  // Reverse: if was marked done, unmark it; if was unmarked, mark it
  const reverseDone=!wasMarkedDone;
  goals=goals.map(g=>g.id!==gid?g:{...g,sub:g.sub.map(s=>s.id!==sid?s:{...s,tasks:s.tasks.map(k=>{
    if(k.id!==tid)return k;
    return{...k,done:reverseDone,done_date:reverseDone?td:null};
  })})});
  try{
    await dbPatch('tasks',{done:reverseDone,done_date:reverseDone?td:null},`?id=eq.${tid}`);
    setSyncStatus('ok','Synced');
  }catch(e){setSyncStatus('err','Sync failed');}
  render();renderSidebar();
  showToast('Undone!','info');
}

// ─── File attach with GitHub upload ───────────────────────────────────────
function triggerAttach(gid,sid,tid){
  attachTarget={gid,sid,tid};
  const fi=document.getElementById('file-input');fi.value='';fi.onchange=onFileChange;fi.click();
}

async function onFileChange(e){
  const f=e.target.files[0];if(!f||!attachTarget)return;
  const{gid,sid,tid}=attachTarget;

  // Find goal and subgoal names for the path
  const goal=goals.find(g=>g.id===gid);
  const sub=goal?.sub.find(s=>s.id===sid);
  const goalName=(goal?.name||'misc').replace(/[^a-zA-Z0-9_-]/g,'_');
  const subName=(sub?.name||'misc').replace(/[^a-zA-Z0-9_-]/g,'_');
  const filePath=`solutions/${goalName}/${subName}/${f.name}`;

  // Show uploading indicator
  const overlay=document.createElement('div');
  overlay.className='uploading-overlay';
  overlay.innerHTML='<div class="spinner"></div><p>Uploading to GitHub...</p>';
  document.body.appendChild(overlay);

  try{
    // Read file as base64
    const base64 = await new Promise((res,rej)=>{
      const reader=new FileReader();
      reader.onload=ev=>res(ev.target.result.split(',')[1]);
      reader.onerror=()=>rej(new Error('Read failed'));
      reader.readAsDataURL(f);
    });

    // Check if file already exists (to get sha for update)
    const existingSha = await getExistingFileSha(filePath);

    // Upload to GitHub
    const githubUrl = await uploadToGitHub(filePath, base64, existingSha);

    // Save URL to Supabase
    goals=goals.map(g=>g.id!==gid?g:{...g,sub:g.sub.map(s=>s.id!==sid?s:{...s,tasks:s.tasks.map(k=>k.id!==tid?k:{...k,file_name:f.name,file_url:githubUrl})})});
    await dbPatch('tasks',{file_name:f.name,file_url:githubUrl},`?id=eq.${tid}`);

    renderContent();
    showToast('📎 '+f.name+' uploaded to GitHub!','xp');
    setSyncStatus('ok','Synced');
  }catch(err){
    showToast('Upload failed: '+err.message,'err');
    setSyncStatus('err','Upload failed');
  }finally{
    overlay.remove();
  }
}

// ─── Delete goal/sub/task ─────────────────────────────────────────────────
function confirmDelete(type,gid,sid,tid){
  const labels={goal:'this goal and all its sub-goals & tasks',sub:'this sub-goal and all its tasks',task:'this task'};
  if(!confirm('Delete '+labels[type]+'? This cannot be undone.'))return;
  if(type==='task')deleteTask(gid,sid,tid);
  else if(type==='sub')deleteSubgoal(gid,sid);
  else deleteGoal(gid);
}
async function deleteGoal(gid){
  const goal=goals.find(g=>g.id===gid);if(!goal)return;
  // delete tasks, subgoals, goal from DB
  for(const s of goal.sub){for(const t of s.tasks){try{await dbDelete('tasks','?id=eq.'+t.id);}catch(e){}}
    try{await dbDelete('subgoals','?id=eq.'+s.id);}catch(e){}}
  try{await dbDelete('goals','?id=eq.'+gid);}catch(e){}
  goals=goals.filter(g=>g.id!==gid);
  if(view.goalId===gid)navHome();else render();
  showToast('Goal deleted','err');
}
async function deleteSubgoal(gid,sid){
  const goal=goals.find(g=>g.id===gid);if(!goal)return;
  const sub=goal.sub.find(s=>s.id===sid);if(!sub)return;
  for(const t of sub.tasks){try{await dbDelete('tasks','?id=eq.'+t.id);}catch(e){}}
  try{await dbDelete('subgoals','?id=eq.'+sid);}catch(e){}
  goal.sub=goal.sub.filter(s=>s.id!==sid);
  if(view.subId===sid)navGoal(gid);else render();
  showToast('Sub-goal deleted','err');
}
async function deleteTask(gid,sid,tid){
  const goal=goals.find(g=>g.id===gid);if(!goal)return;
  const sub=goal.sub.find(s=>s.id===sid);if(!sub)return;
  try{await dbDelete('tasks','?id=eq.'+tid);}catch(e){}
  sub.tasks=sub.tasks.filter(t=>t.id!==tid);
  render();renderSidebar();
  showToast('Task deleted','err');
}

function exportJSON(){

  const doneT=goals.reduce((a,g)=>a+g.sub.reduce((b,s)=>b+s.tasks.filter(k=>k.done).length,0),0);
  const out={

function openImport(){

  ii.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d._raw&&d._raw.goals){
          if(!confirm('⚠️ This will DELETE all your current goals, sub-goals, and tasks, then replace them with the imported data.\n\nAre you sure you want to continue?'))return;
          showToast('Importing...','info');
          await importRawData(d._raw);
          await loadFromDB();
          render();
          showToast('Import complete!','info');
        }
      }catch(ex){showToast('Could not read file','err');}
    };
    reader.readAsText(f);
  };
  ii.click();
}

async function importRawData(raw){
  await dbDelete('tasks','?id=neq.null');
  await dbDelete('subgoals','?id=neq.null');
  await dbDelete('goals','?id=neq.null');
  for(const g of raw.goals){
    await dbPost('goals',{id:g.id,name:g.name,color:g.color,position:0});
    let sp=0;
    for(const s of g.sub){
      await dbPost('subgoals',{id:s.id,goal_id:g.id,name:s.name,position:sp++});
      let tp=0;
      for(const t of s.tasks){
        await dbPost('tasks',{id:t.id,subgoal_id:s.id,goal_id:g.id,text:t.text,diff:t.diff||'m',done:t.done,done_date:t.done_date||null,file_name:t.file_name||null,file_url:t.file_url||null,position:tp++});
      }
    }
  }
  if(raw.stats){
    await dbPatch('stats',{streak:raw.stats.streak||0,last_active:raw.stats.last_active||null,attendance:raw.stats.attendance||[],claimed:raw.stats.claimed||[],bonus_xp:raw.stats.bonus_xp||0},'?id=eq.1');
  }
}

// ─── Modal ─────────────────────────────────────────────────────────────────
function openModal(type,gid,sid,editId){
  modalState={type,gid:gid||null,sid:sid||null,diff:'m',color:COLORS[0],editId:editId||null};
  const isEdit=!!editId;
  // Find existing data for edit mode
  let existing=null;
  if(isEdit){
    if(type==='task'){const g=goals.find(g=>g.id===gid);const s=g?.sub.find(s=>s.id===sid);existing=s?.tasks.find(t=>t.id===editId);}
    else if(type==='sub'){const g=goals.find(g=>g.id===gid);existing=g?.sub.find(s=>s.id===editId);}
    else{existing=goals.find(g=>g.id===editId);}
  }
  document.getElementById('modal-title').textContent=(isEdit?'Edit ':'Add ')+(type==='goal'?'Goal':type==='sub'?'Sub-goal':'Task');
  document.querySelector('.btn-save').textContent=isEdit?'Save':'Add';
  const body=document.getElementById('modal-body');
  if(type==='task'){
    const preDiff=existing?existing.diff:'m';
    const preText=existing?existing.text.replace(/"/g,'&quot;'):'';
    modalState.diff=preDiff;
    body.innerHTML=`<div class="modal-label">Task question or challenge</div>
    <textarea class="modal-textarea" id="m-text" placeholder="e.g. Can you write a function that...?">${preText}</textarea>
    <div class="modal-label">Difficulty</div>
    <div id="diff-row">
      <button class="diff-opt${preDiff==='e'?' sel-e':''}" onclick="setDiff('e',this)">Easy<br><span style="font-size:10px">+15 XP</span></button>
      <button class="diff-opt${preDiff==='m'?' sel-m':''}" onclick="setDiff('m',this)">Medium<br><span style="font-size:10px">+30 XP</span></button>
      <button class="diff-opt${preDiff==='h'?' sel-h':''}" onclick="setDiff('h',this)">Hard<br><span style="font-size:10px">+60 XP</span></button>
    </div>`;
  }else{
    const preName=existing?existing.name.replace(/"/g,'&quot;'):'';
    const preColor=existing?.color||COLORS[0];
    modalState.color=preColor;
    body.innerHTML=`<div class="modal-label">${type==='goal'?'Goal name':'Sub-goal name'}</div>
    <input class="modal-input" id="m-name" placeholder="${type==='goal'?'e.g. Python, Algorithms...':'e.g. Recursion, Loops...'}" value="${preName}" onkeydown="if(event.key==='Enter')submitModal()">
    ${type==='goal'?`<div class="modal-label">Color</div><div id="color-row">${COLORS.map(c=>`<div class="color-swatch${c===preColor?' sel':''}" style="background:${c}" onclick="setColor('${c}',this)"></div>`).join('')}</div>`:''}`;
  }
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>{const i=document.getElementById('m-name')||document.getElementById('m-text');if(i)i.focus();},50);
}
function setDiff(d,el){modalState.diff=d;document.querySelectorAll('.diff-opt').forEach(b=>b.className='diff-opt');el.className='diff-opt sel-'+d;}
function setColor(c,el){modalState.color=c;document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.querySelector('.btn-save').textContent='Add';}
function handleOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
async function submitModal(){
  const{type,gid,sid,editId}=modalState;
  if(editId){
    // Edit mode
    if(type==='goal'){const n=(document.getElementById('m-name')||{}).value?.trim();if(!n)return;await editGoal(editId,n,modalState.color);}
    else if(type==='sub'){const n=(document.getElementById('m-name')||{}).value?.trim();if(!n)return;await editSubgoal(editId,gid,n);}
    else{const t=(document.getElementById('m-text')||{}).value?.trim();if(!t)return;await editTask(editId,gid,sid,t,modalState.diff);}
    showToast('Saved!','info');
  }else{
    if(type==='goal'){const n=(document.getElementById('m-name')||{}).value?.trim();if(!n)return;await addGoal(n,modalState.color);}
    else if(type==='sub'){const n=(document.getElementById('m-name')||{}).value?.trim();if(!n)return;await addSubgoal(gid,n);}
    else{const t=(document.getElementById('m-text')||{}).value?.trim();if(!t)return;await addTask(gid,sid,t,modalState.diff);}
    showToast({goal:'Goal added!',sub:'Sub-goal added!',task:'Task added!'}[type],'info');
  }
  closeModal();
}

// ─── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg,type,undoFn){
  const w=document.getElementById('toast-wrap');
  const el=document.createElement('div');
  el.className='toast '+(type||'');
  if(undoFn){
    el.innerHTML=msg+' <span style="color:#7F77DD;cursor:pointer;font-weight:700;margin-left:6px;text-decoration:underline" id="undo-link">Undo</span>';
    w.appendChild(el);
    el.querySelector('#undo-link').onclick=()=>{undoFn();el.remove();};
  }else{
    el.textContent=msg;
    w.appendChild(el);
  }
  setTimeout(()=>el.remove(),undoFn?4500:3200);
}

// ─── Render Content ────────────────────────────────────────────────────────
function renderContent(){
  const c=document.getElementById('content');
  const cg=goals.find(g=>g.id===view.goalId)||null;
  const cs=cg?.sub.find(s=>s.id===view.subId)||null;

  if(cg&&cs){
    const done=cs.tasks.filter(t=>t.done).length;
    let h=`<div class="section-row"><div><div class="section-title">${esc(cs.name)}</div><div class="section-sub">${done}/${cs.tasks.length} tasks complete</div></div>
    <button class="action-btn" style="background:#7F77DD" onclick="openModal('task','${cg.id}','${cs.id}')">+ Add Task</button></div>`;
    if(!cs.tasks.length)h+=`<div class="empty">No tasks yet — click Add Task above</div>`;
    const filteredTasks = cs.tasks.filter(t=>matchSearch(t.text));
    if(searchQuery && filteredTasks.length===0)h+=`<div class="empty">No tasks match "${esc(searchQuery)}"</div>`;
    filteredTasks.forEach(t=>{
      const dc=t.diff==='e'?'diff-e':t.diff==='h'?'diff-h':'diff-m';
      const dl=t.diff==='e'?'Easy':t.diff==='h'?'Hard':'Medium';
      const fileHtml = t.file_url
        ? `<a class="file-link" href="${t.file_url}" target="_blank" title="${esc(t.file_name)}">📎 ${esc(t.file_name)}</a>`
        : (t.file_name ? `<span class="file-link" title="${esc(t.file_name)}">📎 ${esc(t.file_name)}</span>` : '');
      h+=`<div class="task-row${t.done?' done':''}">
        <div class="task-check${t.done?' checked':''}" onclick="toggleTask('${cg.id}','${cs.id}','${t.id}')"></div>
        <span class="task-text">${esc(t.text)}</span>
        <div class="task-right">
          ${fileHtml}
          <span class="diff-badge ${dc}">${dl} +${XPV[t.diff]}</span>
          <button class="attach-btn${t.file_name?' has-file':''}" onclick="event.stopPropagation();triggerAttach('${cg.id}','${cs.id}','${t.id}')">📎 ${t.file_name?'Update':'Attach'}</button>
          <button class="edit-btn" onclick="event.stopPropagation();openModal('task','${cg.id}','${cs.id}','${t.id}')" title="Edit task">✏️</button>
          <button class="del-btn" onclick="event.stopPropagation();confirmDelete('task','${cg.id}','${cs.id}','${t.id}')" title="Delete task">✕</button>
        </div></div>`;
    });
    c.innerHTML=h;return;
  }

  if(cg){
    const gd=cg.sub.reduce((a,s)=>a+s.tasks.filter(t=>t.done).length,0);
    const gt=cg.sub.reduce((a,s)=>a+s.tasks.length,0);
    let h=`<div class="section-row"><div><div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:${cg.color}"></div><div class="section-title">${esc(cg.name)}</div></div>
    <div class="section-sub">${gd}/${gt} tasks complete</div></div>
    <button class="action-btn" style="background:${cg.color}" onclick="openModal('sub','${cg.id}')">+ Add Sub-goal</button></div>`;
    if(!cg.sub.length)h+=`<div class="empty">No sub-goals yet — click Add Sub-goal above</div>`;
    const filteredSubs = searchQuery
      ? cg.sub.filter(s=>matchSearch(s.name)||s.tasks.some(t=>matchSearch(t.text)))
      : cg.sub;
    if(searchQuery && filteredSubs.length===0)h+=`<div class="empty">No sub-goals match "${esc(searchQuery)}"</div>`;
    filteredSubs.forEach(s=>{
      const sd=s.tasks.filter(t=>t.done).length,comp=s.tasks.length>0&&sd===s.tasks.length;
      h+=`<div class="sg-card${comp?' complete':''}" onclick="navSub('${cg.id}','${s.id}')">
        <span style="font-size:16px">${comp?'✓':'📂'}</span>
        <span class="sg-name">${esc(s.name)}</span>
        ${comp?'<span class="badge-complete">Complete</span>':''}
        <span class="sg-meta">${sd}/${s.tasks.length} tasks</span>
        <button class="edit-btn" onclick="event.stopPropagation();openModal('sub','${cg.id}',null,'${s.id}')" title="Edit sub-goal">✏️</button>
        <button class="del-btn" onclick="event.stopPropagation();confirmDelete('sub','${cg.id}','${s.id}')" title="Delete sub-goal">✕</button>
        <span style="color:#8878c0;font-size:14px">›</span></div>`;
    });
    c.innerHTML=h;return;
  }

  const allT=goals.reduce((a,g)=>a+g.sub.reduce((b,s)=>b+s.tasks.length,0),0);
  const doneT=goals.reduce((a,g)=>a+g.sub.reduce((b,s)=>b+s.tasks.filter(k=>k.done).length,0),0);
  let h=`<div class="section-row"><div><div class="section-title">All Goals</div><div class="section-sub">${doneT} of ${allT} tasks complete</div></div></div>`;
  const filteredGoals = searchQuery
    ? goals.filter(g=>matchSearch(g.name)||g.sub.some(s=>matchSearch(s.name)||s.tasks.some(t=>matchSearch(t.text))))
    : goals;
  if(searchQuery && filteredGoals.length===0)h+=`<div class="empty">No goals match "${esc(searchQuery)}"</div>`;
  filteredGoals.forEach(g=>{
    const gd=g.sub.reduce((a,s)=>a+s.tasks.filter(t=>t.done).length,0);
    const gt=g.sub.reduce((a,s)=>a+s.tasks.length,0);
    const comp=gt>0&&gd===gt,pct=gt?Math.round(gd/gt*100):0;
    h+=`<div class="goal-card" onclick="navGoal('${g.id}')">
      <span style="font-size:18px">📁</span>
      <div class="gc-bar-wrap"><div class="gc-name">${esc(g.name)}</div>
      <div class="gc-prog"><div class="gc-prog-fill" style="width:${pct}%;background:${g.color}"></div></div></div>
      ${comp?'<span class="badge-complete">Complete</span>':''}
      <span class="gc-meta">${gd}/${gt} tasks</span>
      <button class="edit-btn" onclick="event.stopPropagation();openModal('goal',null,null,'${g.id}')" title="Edit goal">✏️</button>
      <button class="del-btn" onclick="event.stopPropagation();confirmDelete('goal','${g.id}')" title="Delete goal">✕</button>
      <span class="gc-arr">›</span></div>`;
  });
  h+=`<div class="add-row" onclick="openModal('goal')">+ Add new goal</div>`;
  c.innerHTML=h;
}

function render(){renderSidebar();renderBreadcrumb();renderContent();}

// ─── Token Setup ───────────────────────────────────────────────────────────
function setupToken(){
  const current = localStorage.getItem('gh_token') || '';
  const token = prompt('Enter your GitHub Personal Access Token:\n(Stored only in your browser, never in code)', current);
  if(token === null) return;
  if(token.trim()){
    localStorage.setItem('gh_token', token.trim());
    showToast('GitHub token saved!', 'xp');
  } else {
    localStorage.removeItem('gh_token');
    showToast('Token cleared', 'info');
  }
}
