<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>SUBHENDU — RPG Quest Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:#0f0d1a;color:#ede9ff;height:100vh;overflow:hidden;font-size:15px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#3d3570;border-radius:3px}::-webkit-scrollbar-track{background:transparent}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:308px;min-width:308px;background:#140f24;border-right:1px solid #2d2650;display:flex;flex-direction:column;overflow-y:auto}
#main{flex:1;background:#1a1430;display:flex;flex-direction:column;min-width:0}
.sb-section{padding:12px 14px;border-bottom:1px solid #2d2650}
.sb-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#a89de0;margin-bottom:8px}
#lv-circle{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#7F77DD,#6C5CE7);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;border:2.5px solid #4a3f8a;box-shadow:0 0 16px rgba(127,119,221,.35)}
#sb-name{color:#fff;font-size:18px;font-weight:900;letter-spacing:.16em;text-align:center}
#sb-title{color:#d4c8f8;font-size:13px;text-align:center;margin-top:4px;font-weight:500}
#sb-tasks{color:#a89de0;font-size:11px;text-align:center;margin-top:5px}
#xp-labels{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px;color:#c4b8f0}
#xp-track{height:6px;background:#2d2650;border-radius:3px;overflow:hidden}
#xp-fill{height:100%;background:linear-gradient(90deg,#7F77DD,#a78bfa);border-radius:3px;transition:width .5s ease;position:relative;overflow:hidden}
#xp-fill::after{content:'';position:absolute;top:0;left:-50%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 2.5s infinite}
@keyframes shimmer{0%{left:-50%}100%{left:150%}}
#xp-next{font-size:10px;color:#a89de0;text-align:right;margin-top:4px}
#week-row{display:flex;gap:3px}
.wd{flex:1;text-align:center}
.wd-lbl{font-size:10px;color:#a89de0;margin-bottom:3px}
.wd-sq{height:20px;border-radius:3px;background:#2d2650;transition:background .3s}
.wd-sq.active{background:#7F77DD}
.wd-sq.today{border:1.5px solid #b0a6e0}
#streak-num{color:#f5c842;font-size:28px;font-weight:800;line-height:1}
.ms-item{display:flex;align-items:center;gap:7px;margin-bottom:6px;padding:5px 8px;border-radius:6px;background:#1e1838;border:1px solid #2d2650}
.ms-item.ready{border-color:#7F77DD;background:#2a2558}
.ms-item.claimed{opacity:.38}
.ms-lbl{flex:1;font-size:11px;color:#e8e4ff}
.ms-xp{font-size:10px;padding:2px 7px;border-radius:4px;background:#2d2650;color:#a89de0;font-weight:600}
.ms-item.ready .ms-xp{background:#3b3000;color:#f5c842}
.ms-item.claimed .ms-xp{background:#0a3d28;color:#4ade80}
#txp-val{color:#b89dff;font-size:30px;font-weight:800;line-height:1;margin-top:4px}
#txp-total{color:#a89de0;font-size:11px;margin-top:4px}
#topbar{padding:12px 20px;border-bottom:1px solid #2d2650;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#breadcrumb{display:flex;align-items:center;gap:6px;font-size:14px}
.crumb{color:#7F77DD;cursor:pointer}.crumb:hover{text-decoration:underline}
.crumb-cur{color:#e8e4ff;font-weight:600}
.crumb-sep{color:#a89de0}
#topbar-right{display:flex;gap:8px;align-items:center}
.tb-btn{padding:6px 13px;background:#2d2650;color:#e8e4ff;border:1px solid #3d3570;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500}
.tb-btn:hover{background:#3d3570}
.tb-btn.primary{background:#7F77DD;border-color:#7F77DD;color:#fff}
.tb-btn.primary:hover{background:#9b96e8}
.tb-btn.icon{width:34px;height:34px;padding:0;font-size:15px;display:flex;align-items:center;justify-content:center;position:relative}
.tb-btn.icon:hover::after{content:attr(title);position:absolute;bottom:-28px;right:0;background:#1e1838;border:1px solid #3d3570;color:#e8e4ff;font-size:11px;padding:3px 8px;border-radius:5px;white-space:nowrap;z-index:100}
#sync-status{font-size:12px;color:#a89de0;display:flex;align-items:center;gap:5px}
#sync-dot{width:7px;height:7px;border-radius:50%;background:#a89de0}
#sync-dot.ok{background:#1D9E75}
#sync-dot.err{background:#ef4444}
#sync-dot.syncing{background:#f5c842;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#content{flex:1;overflow-y:auto;padding:20px 24px}
.goal-card{display:flex;align-items:center;gap:14px;padding:18px 20px;background:#1e1838;border:1px solid #2d2650;border-radius:10px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.goal-card:hover{background:#231e42}
.gc-bar-wrap{flex:1;min-width:0}
.gc-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:6px}
.gc-prog{height:5px;background:#2d2650;border-radius:3px;overflow:hidden}
.gc-prog-fill{height:100%;border-radius:3px;transition:width .4s}
.gc-meta{font-size:12px;color:#c4b8f0;white-space:nowrap}
.gc-arr{color:#a89de0;font-size:15px}
.badge-complete{font-size:10px;padding:2px 8px;border-radius:4px;background:#0a3d28;color:#4ade80;font-weight:600;white-space:nowrap}
.sg-card{display:flex;align-items:center;gap:12px;padding:16px 18px;background:#1e1838;border:1px solid #2d2650;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.sg-card:hover{background:#2a2558}
.sg-name{flex:1;font-size:15px;font-weight:600;color:#ede9ff}
.sg-meta{font-size:12px;color:#c4b8f0}
.sg-card.complete{border-color:#1a4a30;background:#0e2a1e}
.sg-card.complete .sg-name{color:#4ade80;text-decoration:line-through}
.task-row{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;background:#1e1838;border:1px solid #2d2650;border-radius:10px;margin-bottom:8px;transition:background .2s}
.task-row.done{background:#0e2a1e;border-color:#1a4a30}
.task-check{width:20px;height:20px;min-width:20px;border-radius:5px;border:1.5px solid #3d3570;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;user-select:none}
.task-check.checked{background:#1D9E75;border-color:#1D9E75}
.task-check.checked::after{content:"✓";color:#fff;font-size:12px}
.task-text{flex:1;font-size:15px;line-height:1.7;color:#ede9ff}
.task-row.done .task-text{color:#4ade80;text-decoration:line-through;opacity:.7}
.task-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:2px;flex-wrap:wrap;justify-content:flex-end}
.diff-badge{font-size:12px;padding:3px 10px;border-radius:5px;font-weight:600;white-space:nowrap}
.diff-e{background:#16432b;color:#4ade80}
.diff-m{background:#2a2558;color:#a78bfa}
.diff-h{background:#3b1f07;color:#fb923c}
.attach-btn{padding:3px 9px;background:transparent;border:1px solid #3d3570;border-radius:5px;color:#a89de0;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px}
.attach-btn:hover{border-color:#7F77DD;color:#b0a6e0}
.attach-btn.has-file{border-color:#7F77DD;color:#a78bfa}
.file-link{font-size:10px;color:#7F77DD;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none;border:1px solid #3d3570;border-radius:4px;padding:2px 6px;display:flex;align-items:center;gap:3px}
.file-link:hover{border-color:#7F77DD;color:#b0a6e0}
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:.02em}
.section-sub{font-size:14px;color:#c4b8f0;margin-top:4px;font-weight:400}
.action-btn{padding:7px 14px;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:#fff}
.add-row{display:flex;align-items:center;gap:10px;padding:14px 18px;background:transparent;border:1px dashed #3d3570;border-radius:8px;cursor:pointer;color:#a89de0;font-size:14px;margin-bottom:10px}
.add-row:hover{background:#1e1838;color:#e8e4ff;border-color:#7F77DD}
.empty{text-align:center;padding:40px 20px;color:#a89de0;font-size:14px}
#loading-screen{position:fixed;inset:0;background:#0f0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
#loading-screen h2{color:#e8e4ff;font-size:20px}
#loading-screen p{color:#a89de0;font-size:14px}
.spinner{width:36px;height:36px;border:3px solid #2d2650;border-top-color:#7F77DD;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast-wrap{position:fixed;top:14px;right:14px;display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none}
.toast{padding:10px 16px;background:#1e1838;color:#e8e4ff;border-left:3px solid #7F77DD;border:1px solid #3d3570;border-left-width:3px;border-radius:8px;font-size:14px;font-weight:500;animation:tIn .25s ease;max-width:300px}
.toast.xp{border-left-color:#1D9E75}
.toast.milestone{border-left-color:#f5c842}
.toast.err{border-left-color:#ef4444}
@keyframes tIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
#modal-overlay{position:fixed;inset:0;background:rgba(5,3,15,.78);display:none;align-items:center;justify-content:center;z-index:9998}
#modal-overlay.open{display:flex}
#modal-box{background:#1e1838;border-radius:12px;padding:24px;width:420px;max-width:92vw;border:1px solid #3d3570}
#modal-title{font-size:16px;font-weight:700;color:#e8e4ff;margin-bottom:16px}
.modal-label{font-size:12px;color:#c4b8f0;margin-bottom:5px;margin-top:12px}
.modal-input{width:100%;padding:10px 12px;background:#12102a;border:1px solid #3d3570;border-radius:7px;font-size:15px;color:#e8e4ff;font-family:'Inter',inherit}
.modal-input:focus{outline:none;border-color:#7F77DD}
.modal-textarea{width:100%;height:80px;padding:10px 12px;background:#12102a;border:1px solid #3d3570;border-radius:7px;font-size:14px;color:#e8e4ff;font-family:'Inter',inherit;resize:vertical}
.modal-textarea:focus{outline:none;border-color:#7F77DD}
#diff-row{display:flex;gap:8px;margin-top:6px}
.diff-opt{flex:1;padding:8px 4px;border-radius:7px;border:2px solid #2d2650;background:#12102a;color:#a89de0;cursor:pointer;font-size:13px;font-weight:500;text-align:center}
.diff-opt.sel-e{border-color:#4ade80;background:#16432b;color:#4ade80}
.diff-opt.sel-m{border-color:#a78bfa;background:#2a2558;color:#a78bfa}
.diff-opt.sel-h{border-color:#fb923c;background:#3b1f07;color:#fb923c}
#color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.color-swatch.sel{border-color:#fff}
#modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-cancel{padding:9px 18px;border-radius:7px;border:1px solid #3d3570;background:transparent;color:#c4b8f0;cursor:pointer;font-size:14px}
.btn-save{padding:9px 22px;border-radius:7px;border:none;background:#7F77DD;color:#fff;cursor:pointer;font-size:14px;font-weight:700}
.uploading-overlay{position:fixed;inset:0;background:rgba(5,3,15,.6);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px}
.uploading-overlay p{color:#e8e4ff;font-size:14px}
.edit-btn{width:26px;height:26px;min-width:26px;border-radius:5px;border:1px solid transparent;background:transparent;color:#a89de0;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
*:hover>.edit-btn{opacity:1}
.edit-btn:hover{background:#1a2a4a;border-color:#7F77DD;color:#7F77DD}
#levelup-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#1a1430,#2a1f4e);border:2px solid #7F77DD;border-radius:16px;padding:32px 48px;text-align:center;z-index:10000;opacity:0;transition:all .4s cubic-bezier(.175,.885,.32,1.275);pointer-events:none;box-shadow:0 0 60px rgba(127,119,221,.5),0 0 120px rgba(127,119,221,.2)}
#levelup-banner.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#levelup-banner h2{font-size:28px;font-weight:800;color:#f5c842;margin-bottom:6px}
#levelup-banner p{font-size:16px;color:#c4b8f0}
@keyframes lvlGlow{0%,100%{box-shadow:0 0 60px rgba(127,119,221,.5),0 0 120px rgba(127,119,221,.2)}50%{box-shadow:0 0 80px rgba(127,119,221,.7),0 0 160px rgba(127,119,221,.3)}}
#levelup-banner.show{animation:lvlGlow 1.2s ease infinite}
#menu-toggle{display:none;width:36px;height:36px;border:1px solid #3d3570;border-radius:8px;background:#1e1838;color:#e8e4ff;font-size:18px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0}
#sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(5,3,15,.6);z-index:99}
@media(max-width:768px){
  #menu-toggle{display:flex}
  #sidebar{position:fixed;left:-320px;top:0;bottom:0;z-index:100;transition:left .3s ease;box-shadow:none}
  #sidebar.open{left:0;box-shadow:4px 0 30px rgba(0,0,0,.5)}
  #sidebar-backdrop.open{display:block}
  #topbar{padding:12px 14px}
  #content{padding:16px}
}
/* ── Confetti ── */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:10001}
/* ── Difficulty Filter ── */
.diff-filter{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.diff-filter-btn{padding:5px 14px;border-radius:6px;border:1px solid #3d3570;background:transparent;color:#a89de0;cursor:pointer;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;transition:all .15s}
.diff-filter-btn:hover{border-color:#7F77DD;color:#e8e4ff}
.diff-filter-btn.active{background:#7F77DD;border-color:#7F77DD;color:#fff}
/* ── Stats Panel ── */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.stat-val{color:#e8e4ff;font-weight:700;font-size:13px}
.stat-lbl{color:#a89de0;font-size:11px}
.stat-goal-name{color:#a89de0;font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
/* ── Achievement Overlay ── */
#ach-overlay{position:fixed;inset:0;background:rgba(5,3,15,.92);display:none;flex-direction:column;z-index:10002;overflow:hidden}
#ach-overlay.open{display:flex}
#ach-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #2d2650;flex-shrink:0}
#ach-header h2{font-size:20px;font-weight:800;color:#fff}
#ach-gold{display:flex;align-items:center;gap:6px;color:#f5c842;font-size:16px;font-weight:700}
#ach-close{width:36px;height:36px;border-radius:8px;border:1px solid #3d3570;background:transparent;color:#e8e4ff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#ach-close:hover{background:#3d3570}
#ach-body{flex:1;overflow-y:auto;padding:20px 24px}
.ach-profile{display:flex;align-items:center;gap:20px;padding:20px;background:#1e1838;border:1px solid #2d2650;border-radius:12px;margin-bottom:24px}
.ach-profile-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#7F77DD,#6C5CE7);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;border:3px solid #4a3f8a;flex-shrink:0}
.ach-profile-info{flex:1;min-width:0}
.ach-profile-name{font-size:18px;font-weight:800;color:#fff}
.ach-profile-sub{font-size:13px;color:#a89de0;margin-top:2px}
.ach-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ach-badge-icon{width:34px;height:34px;border-radius:8px;background:#2d2650;border:1.5px solid #3d3570;display:flex;align-items:center;justify-content:center;font-size:16px}
.ach-badge-icon.earned{background:#2a2558;border-color:#7F77DD;box-shadow:0 0 8px rgba(127,119,221,.3)}
.ach-badge-icon.locked{opacity:.25;filter:grayscale(1)}
.ach-tier-title{font-size:13px;font-weight:700;color:#a89de0;text-transform:uppercase;letter-spacing:.1em;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.ach-tier-title:first-of-type{margin-top:0}
.ach-stars{display:flex;gap:2px;font-size:12px}
.ach-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#1e1838;border:1px solid #2d2650;border-radius:10px;margin-bottom:8px;transition:all .2s}
.ach-item.completed{border-color:#1a4a30}
.ach-item.claimed{opacity:.45}
.ach-icon{width:40px;height:40px;border-radius:10px;background:#12102a;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ach-info{flex:1;min-width:0}
.ach-name{font-size:14px;font-weight:700;color:#e8e4ff}
.ach-desc{font-size:12px;color:#a89de0;margin-top:2px}
.ach-prog-bar{height:4px;background:#2d2650;border-radius:2px;margin-top:6px;overflow:hidden}
.ach-prog-fill{height:100%;border-radius:2px;transition:width .3s}
.ach-rewards{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;min-width:70px}
.ach-rwd{font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px}
.ach-rwd.xp{color:#b89dff}
.ach-rwd.gold-rwd{color:#f5c842}
.ach-rwd.badge-rwd{color:#a78bfa;font-size:13px}
.ach-claim{padding:6px 16px;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;transition:all .15s}
.ach-claim.ready{background:#1D9E75;color:#fff}
.ach-claim.ready:hover{background:#22b884;transform:scale(1.05)}
.ach-claim.done{background:#2d2650;color:#a89de0;cursor:default}
.ach-claim.locked{background:transparent;border:1px solid #2d2650;color:#3d3570;cursor:default}
/* ── Batch Complete ── */
.batch-btn{padding:7px 14px;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:#fff;background:#1D9E75;margin-left:8px}
.batch-btn:hover{background:#22b884}
.batch-btn:disabled{opacity:.35;cursor:default;background:#1D9E75}
/* ── Due Date ── */
.due-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.due-badge.upcoming{background:#2a2558;color:#a78bfa}
.due-badge.overdue{background:#3b1f07;color:#fb923c;animation:pulse 2s infinite}
.due-badge.today-due{background:#16432b;color:#4ade80}
/* ── Gold in sidebar ── */
#sb-gold{color:#f5c842;font-size:15px;font-weight:700}
#sb-gold-icon{font-size:14px}
/* ── Drag & Drop ── */
.drag-handle{color:#3d3570;cursor:grab;font-size:14px;user-select:none;padding:2px 4px;line-height:1;opacity:0;transition:opacity .15s;flex-shrink:0}
*:hover>.drag-handle{opacity:1}
.drag-handle:active{cursor:grabbing}
.goal-card.dragging,.sg-card.dragging,.task-row.dragging{opacity:.35;transform:scale(.97)}
.drop-indicator{height:3px;border-radius:2px;margin:-2px 0;background:#7F77DD;box-shadow:0 0 8px rgba(127,119,221,.5);pointer-events:none;animation:dropPulse 1s ease infinite}
@keyframes dropPulse{0%,100%{opacity:.7}50%{opacity:1}}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <h2>Loading Quest Board...</h2>
  <p>Connecting to Supabase</p>
</div>

<div id="app" style="display:none">
  <div id="sidebar-backdrop" onclick="toggleSidebar()"></div>
  <div id="sidebar">
    <div class="sb-section" style="text-align:center;padding:18px 14px 14px">
      <div id="lv-circle">Lv1</div>
      <div id="sb-name">SUBHENDU</div>
      <div id="sb-title">Newcomer</div>
      <div id="sb-tasks">0 / 0 tasks done</div>
    </div>

async function uploadToGitHub(filePath, fileContent, existingSha=null){
  const url = `${GH_API}/repos/${GH_OWNER}/${GH_REPO}/contents/${filePath}`;
  const body = {
    message: `Add solution: ${filePath}`,
    content: fileContent, // base64
  };
  if(existingSha) body.sha = existingSha;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `Bearer ${getGHToken()}`,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github+json'
    },
    body: JSON.stringify(body)
  });
  if(!res.ok){
    const e = await res.json();
    throw new Error(e.message || 'GitHub upload failed');
  }
  const data = await res.json();
  return data.content.html_url;
}

// ─── File attach with GitHub upload ───────────────────────────────────────
function triggerAttach(gid,sid,tid){
  attachTarget={gid,sid,tid};
  const fi=document.getElementById('file-input');fi.value='';fi.onchange=onFileChange;fi.click();
}

async function onFileChange(e){
  const f=e.target.files[0];if(!f||!attachTarget)return;
  const{gid,sid,tid}=attachTarget;

  // Find goal and subgoal names for the path
  const goal=goals.find(g=>g.id===gid);
  const sub=goal?.sub.find(s=>s.id===sid);
  const goalName=(goal?.name||'misc').replace(/[^a-zA-Z0-9_-]/g,'_');
  const subName=(sub?.name||'misc').replace(/[^a-zA-Z0-9_-]/g,'_');
  const filePath=`solutions/${goalName}/${subName}/${f.name}`;

  // Show uploading indicator
  const overlay=document.createElement('div');
  overlay.className='uploading-overlay';
  overlay.innerHTML='<div class="spinner"></div><p>Uploading to GitHub...</p>';
  document.body.appendChild(overlay);

  try{
    // Read file as base64
    const base64 = await new Promise((res,rej)=>{
      const reader=new FileReader();
      reader.onload=ev=>res(ev.target.result.split(',')[1]);
      reader.onerror=()=>rej(new Error('Read failed'));
      reader.readAsDataURL(f);
    });

    // Check if file already exists (to get sha for update)
    const existingSha = await getExistingFileSha(filePath);

    // Upload to GitHub
    const githubUrl = await uploadToGitHub(filePath, base64, existingSha);

    // Save URL to Supabase
    goals=goals.map(g=>g.id!==gid?g:{...g,sub:g.sub.map(s=>s.id!==sid?s:{...s,tasks:s.tasks.map(k=>k.id!==tid?k:{...k,file_name:f.name,file_url:githubUrl})})});
    await dbPatch('tasks',{file_name:f.name,file_url:githubUrl},`?id=eq.${tid}`);

    renderContent();
    showToast('📎 '+f.name+' uploaded to GitHub!','xp');
    setSyncStatus('ok','Synced');
  }catch(err){
    showToast('Upload failed: '+err.message,'err');
    setSyncStatus('err','Upload failed');
  }finally{
    overlay.remove();
  }
}

async function importRawData(raw){
  await dbDelete('tasks','?id=neq.null');
  await dbDelete('subgoals','?id=neq.null');
  await dbDelete('goals','?id=neq.null');
  for(const g of raw.goals){
    await dbPost('goals',{id:g.id,name:g.name,color:g.color,position:0});
    let sp=0;
    for(const s of g.sub){
      await dbPost('subgoals',{id:s.id,goal_id:g.id,name:s.name,position:sp++});
      let tp=0;
      for(const t of s.tasks){
        await dbPost('tasks',{id:t.id,subgoal_id:s.id,goal_id:g.id,text:t.text,diff:t.diff||'m',done:t.done,done_date:t.done_date||null,file_name:t.file_name||null,file_url:t.file_url||null,position:tp++});
      }
    }
  }
  if(raw.stats){
    await dbPatch('stats',{streak:raw.stats.streak||0,last_active:raw.stats.last_active||null,attendance:raw.stats.attendance||[],claimed:raw.stats.claimed||[],bonus_xp:raw.stats.bonus_xp||0,gold:raw.stats.gold||0,ach_claimed:raw.stats.ach_claimed||[]},'?id=eq.1');
  }
}

    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.25);
  });
}

// ─── Confetti System ──────────────────────────────────────────────────
const _confettiColors=['#7F77DD','#a78bfa','#f5c842','#4ade80','#fb923c','#e8e4ff','#1D9E75'];
let _confettiRaf=null;
function fireConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const particles=Array.from({length:80},()=>({
    x:canvas.width/2+(Math.random()-0.5)*200,y:canvas.height/2-60,
    vx:(Math.random()-0.5)*14,vy:Math.random()*-15-5,
    w:Math.random()*8+4,h:Math.random()*6+3,
    color:_confettiColors[Math.floor(Math.random()*_confettiColors.length)],
    rot:Math.random()*360,rv:(Math.random()-0.5)*14,life:1
  }));
  if(_confettiRaf)cancelAnimationFrame(_confettiRaf);
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    particles.forEach(p=>{
      if(p.life<=0)return;alive=true;
      p.x+=p.vx;p.vy+=0.35;p.y+=p.vy;p.rot+=p.rv;p.life-=0.013;p.vx*=0.99;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
    if(alive)_confettiRaf=requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);_confettiRaf=null;}
  }
  draw();
}

// ─── Achievement System ──────────────────────────────────────────────
function getAchProgress(id){
  const td=toDay();
  const allDone=[];
  goals.forEach(g=>g.sub.forEach(s=>s.tasks.forEach(t=>{if(t.done)allDone.push(t);})));
  const totalDone=allDone.length;
  const todayDone=allDone.filter(t=>t.done_date===td).length;
  const goalsWithDone=new Set();
  goals.forEach(g=>{if(g.sub.some(s=>s.tasks.some(t=>t.done)))goalsWithDone.add(g.id);});
  const completedSubs=goals.reduce((a,g)=>a+g.sub.filter(s=>s.tasks.length>0&&s.tasks.every(t=>t.done)).length,0);
  const completedGoals=goals.filter(g=>g.sub.length>0&&g.sub.every(s=>s.tasks.length>0&&s.tasks.every(t=>t.done))).length;
  const tasksWithFiles=goals.reduce((a,g)=>a+g.sub.reduce((b,s)=>b+s.tasks.filter(t=>t.file_name).length,0),0);
  const hardDoneToday=allDone.filter(t=>t.diff==='h'&&t.done_date===td).length;
  const deadlineCrushes=allDone.filter(t=>t.due_date&&t.done_date&&t.done_date<=t.due_date).length;
  const xp=totalXP();const lv=lvInfo(xp);
  switch(id){
    case 0:return totalDone;
    case 1:return totalDone;
    case 2:return tasksWithFiles;
    case 3:return stats.streak||0;
    case 4:return goals.length;
    case 5:return goalsWithDone.size;
    case 6:return totalDone;
    case 7:return stats.streak||0;
    case 8:return todayDone;
    case 9:return deadlineCrushes;
    case 10:return completedSubs;
    case 11:return goalsWithDone.size;
    case 12:return totalDone;
    case 13:return stats.streak||0;
    case 14:return completedGoals;
    case 15:return todayDone;
    case 16:return hardDoneToday;
    case 17:return lv.lv;
    default:return 0;
  }
}

async function claimAchievement(id){
  const ach=ACHIEVEMENTS[id];
  const claimed=stats.ach_claimed||[];
  if(claimed.includes(id))return;
  const progress=getAchProgress(id);
  if(progress<ach.target)return;
  claimed.push(id);
  const newGold=(stats.gold||0)+ach.gold;
  const newBonusXP=(stats.bonus_xp||0)+ach.xp;
  stats.ach_claimed=claimed;stats.gold=newGold;stats.bonus_xp=newBonusXP;
  try{
    await dbPatch('stats',{ach_claimed:claimed,gold:newGold,bonus_xp:newBonusXP},'?id=eq.1');
    setSyncStatus('ok','Synced');
  }catch(e){setSyncStatus('err','DB may need gold/ach_claimed columns');}
  const badgeTxt=ach.badge?' · Badge: '+ach.badge:'';
  showToast('🏆 '+ach.name+' claimed! +'+ach.xp+' XP, +'+ach.gold+' Gold'+badgeTxt,'milestone');
  fireConfetti();playDing();
  renderAchievements();renderSidebar();
}

  let h=`<div class="ach-profile">
    <div class="ach-profile-avatar">Lv${lv.lv}</div>
    <div class="ach-profile-info">
      <div class="ach-profile-name">SUBHENDU</div>

      }).join('')}</div>
    </div></div>`;
  const tiers=[{key:'easy',label:'Easy',stars:1},{key:'medium',label:'Medium',stars:2},{key:'hard',label:'Hard',stars:3}];
  tiers.forEach(tier=>{
    const achs=ACHIEVEMENTS.filter(a=>a.tier===tier.key);
    h+=`<div class="ach-tier-title"><div class="ach-stars">${Array(tier.stars).fill('<span style="color:#f5c842">⭐</span>').join('')}</div> ${tier.label}</div>`;
    achs.forEach(a=>{
      const progress=getAchProgress(a.id);
      const isClaimed=claimed.includes(a.id);
      const isComplete=progress>=a.target;
      const pct=Math.min(100,Math.round(progress/a.target*100));
      const fillColor=isComplete?'#1D9E75':'#7F77DD';
      let btnClass,btnText;
      if(isClaimed){btnClass='done';btnText='Claimed';}
      else if(isComplete){btnClass='ready';btnText='Claim';}
      else{btnClass='locked';btnText=progress+'/'+a.target;}
      h+=`<div class="ach-item${isComplete?' completed':''}${isClaimed?' claimed':''}">
        <div class="ach-icon">${a.icon}</div>
        <div class="ach-info">
          <div class="ach-name">${a.name}</div>
          <div class="ach-desc">${a.desc}</div>
          <div class="ach-prog-bar"><div class="ach-prog-fill" style="width:${pct}%;background:${fillColor}"></div></div>
        </div>
        <div class="ach-rewards">
          <span class="ach-rwd xp">+${a.xp} XP</span>
          <span class="ach-rwd gold-rwd"><span style="color:#f5c842">●</span> ${a.gold}</span>
          ${a.badge?`<span class="ach-rwd badge-rwd">${a.badge}</span>`:''}
        </div>
        <button class="ach-claim ${btnClass}" onclick="${isComplete&&!isClaimed?`claimAchievement(${a.id})`:''}">${btnText}</button>
      </div>`;
    });
  });
  body.innerHTML=h;
}

  document.getElementById('week-row').innerHTML=week.map((d,i)=>`<div class="wd"><div class="wd-lbl">${WL[i]}</div><div class="wd-sq${att.includes(d)?' active':''}${d===td?' today':''}"></div></div>`).join('');

    const cl=(stats.claimed||[]).includes(i),ready=(stats.streak||0)>=m.days&&!cl;
    return`<div class="ms-item${ready?' ready':''}${cl?' claimed':''}"><span>${cl?'✓':'○'}</span><span class="ms-lbl">${m.days}-day streak</span><span class="ms-xp">+${m.xp} XP</span></div>`;
  }).join('');
  if(lv.lv>prevLevel){showLevelUp(lv.lv,lv.title);prevLevel=lv.lv;}
  // Quick Stats
  let todayDone=0,weekDone=0;
  goals.forEach(g=>g.sub.forEach(s=>s.tasks.forEach(k=>{
    if(k.done&&k.done_date===td)todayDone++;
    if(k.done&&k.done_date&&week.includes(k.done_date))weekDone++;
  })));
  let hardestGoal=null,hardCount=0;
  goals.forEach(g=>{const hc=g.sub.reduce((a,s)=>a+s.tasks.filter(t=>!t.done&&t.diff==='h').length,0);if(hc>hardCount){hardCount=hc;hardestGoal=g.name;}});
  document.getElementById('stats-panel').innerHTML=
    `<div class="stat-row"><span class="stat-lbl">Done today</span><span class="stat-val">${todayDone}</span></div>`+
    `<div class="stat-row"><span class="stat-lbl">Done this week</span><span class="stat-val">${weekDone}</span></div>`+
    `<div class="stat-row"><span class="stat-lbl">Active days</span><span class="stat-val">${att.length}</span></div>`+
    (hardestGoal?`<div class="stat-row"><span class="stat-lbl">Hardest goal</span><span class="stat-goal-name" title="${esc(hardestGoal)}">${esc(hardestGoal)}</span></div>`:'');
}

// ─── Drag & Drop Reorder ──────────────────────────────────────────────────
let _dragData=null,_dropIndicator=null,_dragBlocked=false;
function _getOrCreateIndicator(){
  if(!_dropIndicator){_dropIndicator=document.createElement('div');_dropIndicator.className='drop-indicator';}
  return _dropIndicator;
}
function _removeIndicator(){if(_dropIndicator&&_dropIndicator.parentNode)_dropIndicator.remove();}

document.addEventListener('dragstart',e=>{
  if(_dragBlocked){e.preventDefault();_dragBlocked=false;return;}
  const card=e.target.closest('[data-drag-type]');
  if(!card)return;
  // Don't drag from buttons/inputs/checkboxes
  if(e.target.closest('.task-check,.attach-btn,.edit-btn,.file-link,.diff-badge,.due-badge,.action-btn,.batch-btn')){e.preventDefault();return;}
  _dragData={type:card.dataset.dragType,id:card.dataset.dragId,gid:card.dataset.dragGid,sid:card.dataset.dragSid};
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','');
});
document.addEventListener('dragend',e=>{
  const card=e.target.closest('[data-drag-type]');
  if(card)card.classList.remove('dragging');
  _removeIndicator();_dragData=null;
});
document.addEventListener('dragover',e=>{
  if(!_dragData)return;
  e.preventDefault();e.dataTransfer.dropEffect='move';
  const card=e.target.closest('[data-drag-type]');
  if(!card||card.classList.contains('dragging')){_removeIndicator();return;}
  if(card.dataset.dragType!==_dragData.type){_removeIndicator();return;}
  const rect=card.getBoundingClientRect();
  const mid=rect.top+rect.height/2;
  const ind=_getOrCreateIndicator();
  if(e.clientY<mid){card.parentNode.insertBefore(ind,card);}
  else{card.parentNode.insertBefore(ind,card.nextSibling);}
});
document.addEventListener('drop',e=>{
  if(!_dragData)return;e.preventDefault();
  const ind=_dropIndicator;
  if(!ind||!ind.parentNode){_dragData=null;return;}
  const{type,id,gid,sid}=_dragData;
  const afterId=_getNextId(ind);
  // Reorder in local state
  if(type==='goal'){
    const arr=goals;const idx=arr.findIndex(x=>x.id===id);if(idx<0)return;
    const[item]=arr.splice(idx,1);
    const insertIdx=afterId?arr.findIndex(x=>x.id===afterId):arr.length;
    arr.splice(insertIdx<0?arr.length:insertIdx,0,item);
    arr.forEach((g,i)=>g.position=i);
  }else if(type==='sub'){
    const goal=goals.find(g=>g.id===gid);if(!goal)return;
    const arr=goal.sub;const idx=arr.findIndex(x=>x.id===id);if(idx<0)return;
    const[item]=arr.splice(idx,1);
    const insertIdx=afterId?arr.findIndex(x=>x.id===afterId):arr.length;
    arr.splice(insertIdx<0?arr.length:insertIdx,0,item);
    arr.forEach((s,i)=>s.position=i);
  }else if(type==='task'){
    const goal=goals.find(g=>g.id===gid);if(!goal)return;
    const sub=goal.sub.find(s=>s.id===sid);if(!sub)return;
    const arr=sub.tasks;const idx=arr.findIndex(x=>x.id===id);if(idx<0)return;
    const[item]=arr.splice(idx,1);
    const insertIdx=afterId?arr.findIndex(x=>x.id===afterId):arr.length;
    arr.splice(insertIdx<0?arr.length:insertIdx,0,item);
    arr.forEach((t,i)=>t.position=i);
  }
  _removeIndicator();_dragData=null;
  renderContent();
  // Save new positions to DB
  savePositions(type,gid,sid);
});
function _getNextId(indicator){
  const next=indicator.nextElementSibling;
  if(next&&next.dataset&&next.dataset.dragId)return next.dataset.dragId;
  return null;
}
async function savePositions(type,gid,sid){
  try{
    setSyncStatus('syncing','Saving order...');
    if(type==='goal'){
      for(const g of goals)await dbPatch('goals',{position:g.position},`?id=eq.${g.id}`);
    }else if(type==='sub'){
      const goal=goals.find(g=>g.id===gid);
      if(goal)for(const s of goal.sub)await dbPatch('subgoals',{position:s.position},`?id=eq.${s.id}`);
    }else if(type==='task'){
      const goal=goals.find(g=>g.id===gid);
      const sub=goal?.sub.find(s=>s.id===sid);
      if(sub)for(const t of sub.tasks)await dbPatch('tasks',{position:t.position},`?id=eq.${t.id}`);
    }
    setSyncStatus('ok','Synced');
  }catch(e){setSyncStatus('err','Reorder sync failed');}
}

// ─── Token Setup ───────────────────────────────────────────────────────────
function setupToken(){
  const current = localStorage.getItem('gh_token') || '';
  const token = prompt('Enter your GitHub Personal Access Token:\n(Stored only in your browser, never in code)', current);
  if(token === null) return;
  if(token.trim()){
    localStorage.setItem('gh_token', token.trim());
    showToast('GitHub token saved!', 'xp');
  } else {
    localStorage.removeItem('gh_token');
    showToast('Token cleared', 'info');
  }
}

(async()=>{
  const ok=await loadFromDB();
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  if(ok)render();
})();

// ─── Keyboard Shortcuts ─────────────────────────────────────────────────
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-backdrop').classList.toggle('open');
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='Escape'){
    const m=document.getElementById('modal-overlay');
    const a=document.getElementById('ach-overlay');
    if(m.classList.contains('open'))closeModal();
    else if(a.classList.contains('open'))closeAchievements();
    else if(view.subId)navGoal(view.goalId);
    else if(view.goalId)navHome();
  }
  if(e.key==='/'){e.preventDefault();document.getElementById('search-input').focus();}
  if(e.key==='a'||e.key==='A'){const a=document.getElementById('ach-overlay');if(!a.classList.contains('open'))openAchievements();}
  if(e.key==='n'||e.key==='N'){
    const m=document.getElementById('modal-overlay');
    if(m.classList.contains('open'))return;
    if(view.subId)openModal('task',view.goalId,view.subId);
    else if(view.goalId)openModal('sub',view.goalId);
    else openModal('goal');
  }
});
</script>
